<!DOCTYPE html>
<html lang="vi">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title> Công Cụ Đếm Tiền</title>
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
      <link rel="stylesheet" href="styles.css" />
   </head>
   <body>
      <div class="bg-orb orb-1"></div>
      <div class="bg-orb orb-2"></div>
      <div class="bg-orb orb-3"></div>
      <div class="app-shell">
         <header class="topbar card-glass">
            <div>
               <p class="badge">Ứng dụng đếm tiền</p>
               <h1>Đếm Tiền Kết Ca</h1>
            </div>
            <button type="button" class="btn btn-danger" id="reset-btn">Xóa dữ liệu</button>
         </header>
         <section class="summary card-glass">
            <p>Tổng tiền hiện có trong két</p>
            <h2 id="total-text">0đ</h2>
         </section>
         <section class="card-glass">
            <div class="section-head">
               <h3>Mệnh giá tiền mặt</h3>
               <span>Nhập số tờ của từng mệnh giá</span>
            </div>
            <div id="cash-grid" class="cash-grid"></div>
         </section>
         <section class="card-glass">
            <div class="section-head">
               <h3>Giao dịch phát sinh khi kết ca</h3>
               <span>Tính tiền thối và tự cập nhật lại két</span>
            </div>
            <div class="form-row">
               <label for="bill-amount">Tổng bill (đ)</label>
               <input id="bill-amount" type="number" min="0" step="1000" placeholder="Ví dụ: 11000" />
            </div>
            <div class="section-head mini-head">
               <h4>Khách đưa theo mệnh giá</h4>
               <span>Nhập số tờ khách đưa để cộng đúng vào két</span>
            </div>
            <div id="payment-grid" class="cash-grid payment-grid"></div>
            <div id="change-box" class="change-box hidden">
               <p>Tiền cần thối</p>
               <h4 id="change-val">0đ</h4>
               <div id="change-labels" class="change-labels"></div>
            </div>
            <div class="action-row">
               <button type="button" class="btn btn-secondary" id="close-transaction-btn">Đóng</button>
               <button type="button" class="btn btn-primary" id="apply-btn" disabled>Áp dụng giao dịch</button>
            </div>
         </section>
         <footer class="footer card-glass">
            <button type="button" class="btn btn-ghost" id="copy-btn">Sao chép báo cáo kết ca</button>
         </footer>
      </div>
      <script src="app.js"></script>
   </body>
</html>
